<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 90" width="1200" height="90" fill="none">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#05060a"/><stop offset="8%" stop-color="#0a0a0a"/>
      <stop offset="92%" stop-color="#0a0a0a"/><stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="num07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8dc"/><stop offset="50%" stop-color="#ffd700"/><stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <style>
      .hnum{font:800 54px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:-2px}
      .htitle{font:800 26px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;fill:#fff8dc;letter-spacing:3px}
      .hcode{font:600 13px ui-monospace,'SF Mono','Consolas',monospace;fill:#ffd700;letter-spacing:2px}
      .hmeta{font:600 10px ui-monospace,'SF Mono','Consolas',monospace;fill:#8a7a3a;letter-spacing:3px}
      .harrow{font:700 20px ui-monospace,'SF Mono','Consolas',monospace;fill:#ffd700}
    </style>
  </defs>
  <rect width="1200" height="90" fill="url(#bg07)"/>
  <line x1="0" y1="0" x2="1200" y2="0" stroke="rgba(255,215,0,0.25)"/>
  <line x1="0" y1="89" x2="1200" y2="89" stroke="rgba(255,215,0,0.15)"/>
  <g stroke="#ffd700" stroke-width="2" fill="none">
    <path d="M16 14 L16 6 L28 6"/><path d="M1184 14 L1184 6 L1172 6"/>
    <path d="M16 76 L16 84 L28 84"/><path d="M1184 76 L1184 84 L1172 84"/>
  </g>
  <text x="48" y="64" class="hnum" fill="url(#num07)">07</text>
  <line x1="130" y1="22" x2="130" y2="68" stroke="rgba(255,215,0,0.4)"/>
  <text x="155" y="54" class="harrow">▸</text>
  <text x="195" y="54" class="htitle">
    <tspan>PINNED REPOS</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="7s" repeatCount="indefinite"/>
  </text>
  <text x="195" y="54" class="htitle" opacity="0">
    <tspan>REPOS DESTACADOS</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="7s" repeatCount="indefinite"/>
  </text>
  <text x="195" y="74" class="hcode">&gt; featured.projects()</text>
  <g transform="translate(900 30)">
    <line x1="0" y1="15" x2="130" y2="15" stroke="rgba(255,215,0,0.3)" stroke-dasharray="3 4"/>
    <circle cx="140" cy="15" r="3" fill="#ffd700"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
