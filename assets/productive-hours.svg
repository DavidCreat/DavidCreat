<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 495 195" width="495" height="195" fill="none">
  <defs>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fff8dc"/>
    </linearGradient>
    <linearGradient id="barLow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#3a2d00"/>
      <stop offset="100%" stop-color="#8a6d00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .card-bg { fill: #0a0a0a; stroke: #1a1a1a; stroke-width: 1; }
      .title   { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #FFD700; }
      .sub     { font: 500 9px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #b8860b; letter-spacing: 0.2em; }
      .hour    { font: 600 8px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #8a6d00; }
      .peak    { font: 700 9px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #FFD700; }
      .axis    { stroke: rgba(255,215,0,0.1); stroke-width: 1; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="494" height="194" rx="6" class="card-bg"/>

  <!-- Title -->
  <text x="20" y="26" class="title">Productive Time</text>
  <text x="20" y="42" class="sub">// HOURS UTC−5 //</text>

  <!-- Peak indicator -->
  <g transform="translate(345 22)">
    <rect x="0" y="0" width="130" height="22" rx="4" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
    <circle cx="12" cy="11" r="3" fill="#FFD700">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="22" y="15" class="peak">PEAK · 20:00 − 23:00</text>
  </g>

  <!-- Grid -->
  <line x1="20"  y1="150" x2="475" y2="150" class="axis"/>
  <line x1="20"  y1="110" x2="475" y2="110" class="axis" stroke-dasharray="2 4"/>
  <line x1="20"  y1="80"  x2="475" y2="80"  class="axis" stroke-dasharray="2 4"/>

  <!-- Bars: 24 hours, width=16, gap=3, starting x=25 -->
  <!-- Values represent relative productivity: 0-10 scale mapped to height -->
  <!-- 00:05 15 25 15 10 5 25 45 55 70 80 75 60 65 75 80 78 70 65 85 95 100 85 50 -->

  <g filter="url(#glow)">
    <rect x="25"  y="144" width="16" height="6"  rx="2" fill="url(#barLow)"/>
    <rect x="44"  y="147" width="16" height="3"  rx="2" fill="url(#barLow)"/>
    <rect x="63"  y="140" width="16" height="10" rx="2" fill="url(#barLow)"/>
    <rect x="82"  y="135" width="16" height="15" rx="2" fill="url(#barLow)"/>
    <rect x="101" y="140" width="16" height="10" rx="2" fill="url(#barLow)"/>
    <rect x="120" y="143" width="16" height="7"  rx="2" fill="url(#barLow)"/>
    <rect x="139" y="146" width="16" height="4"  rx="2" fill="url(#barLow)"/>
    <rect x="158" y="135" width="16" height="15" rx="2" fill="url(#bar)"/>
    <rect x="177" y="120" width="16" height="30" rx="2" fill="url(#bar)"/>
    <rect x="196" y="110" width="16" height="40" rx="2" fill="url(#bar)"/>
    <rect x="215" y="95"  width="16" height="55" rx="2" fill="url(#bar)"/>
    <rect x="234" y="85"  width="16" height="65" rx="2" fill="url(#bar)"/>
    <rect x="253" y="90"  width="16" height="60" rx="2" fill="url(#bar)"/>
    <rect x="272" y="105" width="16" height="45" rx="2" fill="url(#bar)"/>
    <rect x="291" y="100" width="16" height="50" rx="2" fill="url(#bar)"/>
    <rect x="310" y="88"  width="16" height="62" rx="2" fill="url(#bar)"/>
    <rect x="329" y="83"  width="16" height="67" rx="2" fill="url(#bar)"/>
    <rect x="348" y="86"  width="16" height="64" rx="2" fill="url(#bar)"/>
    <rect x="367" y="93"  width="16" height="57" rx="2" fill="url(#bar)"/>
    <rect x="386" y="98"  width="16" height="52" rx="2" fill="url(#bar)"/>
    <rect x="405" y="78"  width="16" height="72" rx="2" fill="url(#bar)"/>
    <rect x="424" y="68"  width="16" height="82" rx="2" fill="url(#bar)"/>
    <rect x="443" y="60"  width="16" height="90" rx="2" fill="url(#bar)"/>
    <!-- last bar is peak: add shine animation overlay -->
    <rect x="443" y="60" width="16" height="90" rx="2" fill="#FFF8DC" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Hour labels (every 4h) -->
  <text x="33"  y="170" class="hour" text-anchor="middle">00</text>
  <text x="109" y="170" class="hour" text-anchor="middle">04</text>
  <text x="185" y="170" class="hour" text-anchor="middle">08</text>
  <text x="261" y="170" class="hour" text-anchor="middle">12</text>
  <text x="337" y="170" class="hour" text-anchor="middle">16</text>
  <text x="413" y="170" class="hour" text-anchor="middle">20</text>
  <text x="460" y="170" class="hour" text-anchor="middle">23</text>

  <!-- Footer legend -->
  <g transform="translate(20 182)">
    <rect x="0"   y="-8" width="10" height="10" rx="1" fill="url(#barLow)"/>
    <text x="16"  y="0" class="hour">low</text>
    <rect x="52"  y="-8" width="10" height="10" rx="1" fill="url(#bar)"/>
    <text x="68"  y="0" class="hour">high</text>
    <text x="475" y="0" class="hour" text-anchor="end">based on commit cadence</text>
  </g>
</svg>
