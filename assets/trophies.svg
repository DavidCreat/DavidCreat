        <rect x="0" y="0" width="14" height="3" rx="0.5" fill="#0a0a0a"/>
        <rect x="0" y="3" width="16" height="9" rx="1" fill="#0a0a0a"/>
        <circle cx="4" cy="7.5" r="1" fill="#ffd700"/>
        <rect x="7" y="6.5" width="6" height="1" fill="#ffd700"/>
