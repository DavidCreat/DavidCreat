<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" fill="none">
  <defs>
    <linearGradient id="bgt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0d15"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff8dc"/>
      <stop offset="50%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8a6d00"/>
    </linearGradient>
    <linearGradient id="trophyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,215,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </radialGradient>
    <filter id="tglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .tlabel { font: 700 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; text-anchor: middle; letter-spacing: 1.5px; }
      .tval   { font: 800 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff8dc; text-anchor: middle; }
      .ttier  { font: 700 8px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #0a0a0a; text-anchor: middle; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1200" height="200" fill="url(#bgt)" rx="8"/>

  <!-- subtle grid -->
  <g opacity="0.05" stroke="#ffd700">
    <path d="M0 50 H1200"/><path d="M0 150 H1200"/>
    <path d="M200 0 V200"/><path d="M400 0 V200"/><path d="M600 0 V200"/>
    <path d="M800 0 V200"/><path d="M1000 0 V200"/>
  </g>

  <!-- 7 trophies positioned at 85, 255, 425, 595, 765, 935, 1105 (gap=170) -->

  <!-- Trophy 1: Commits -->
  <g transform="translate(85 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <!-- Cup body -->
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <!-- Handles -->
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <!-- Tier label inside cup -->
    <text y="-18" class="ttier">SSS</text>
    <!-- highlight -->
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Sparkle -->
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="85" y="165" class="tval">1.2K+</text>
  <text x="85" y="185" class="tlabel">COMMITS</text>

  <!-- Trophy 2: Repositories -->
  <g transform="translate(255 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <text y="-18" class="ttier">SS</text>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
  </g>
  <text x="255" y="165" class="tval">30+</text>
  <text x="255" y="185" class="tlabel">REPOSITORIES</text>

  <!-- Trophy 3: Stars -->
  <g transform="translate(425 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <!-- Star icon inside cup -->
    <path d="M0 -25 L3 -20 L8 -19 L4 -16 L5 -11 L0 -13 L-5 -11 L-4 -16 L-8 -19 L-3 -20 Z" fill="#fff8dc"/>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
  <text x="425" y="165" class="tval">15+</text>
  <text x="425" y="185" class="tlabel">STARS</text>

  <!-- Trophy 4: Followers -->
  <g transform="translate(595 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <text y="-18" class="ttier">A+</text>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
  </g>
  <text x="595" y="165" class="tval">50+</text>
  <text x="595" y="185" class="tlabel">FOLLOWERS</text>

  <!-- Trophy 5: Pull Requests -->
  <g transform="translate(765 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <text y="-18" class="ttier">A</text>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>
  <text x="765" y="165" class="tval">80+</text>
  <text x="765" y="185" class="tlabel">PULL REQS</text>

  <!-- Trophy 6: Issues -->
  <g transform="translate(935 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <text y="-18" class="ttier">A</text>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  <text x="935" y="165" class="tval">45+</text>
  <text x="935" y="185" class="tlabel">ISSUES</text>

  <!-- Trophy 7: Languages -->
  <g transform="translate(1105 100)" filter="url(#tglow)">
    <circle cx="0" cy="-8" r="38" fill="url(#glow)"/>
    <path d="M-20 -18 L-20 -30 L20 -30 L20 -18 Q20 5 0 8 Q-20 5 -20 -18 Z" fill="url(#trophyGold)" stroke="#b8860b" stroke-width="1"/>
    <path d="M-20 -25 Q-30 -25 -30 -15 Q-30 -10 -22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M20 -25 Q30 -25 30 -15 Q30 -10 22 -10" fill="none" stroke="url(#trophyGold)" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-5" y="8" width="10" height="5" fill="url(#trophyGold)"/>
    <rect x="-14" y="13" width="28" height="4" rx="1" fill="url(#trophyGold)"/>
    <text y="-18" class="ttier">S</text>
    <path d="M-14 -26 L-14 -15 Q-14 -5 -10 -3" stroke="#fff8dc" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="22" cy="-22" r="1.5" fill="#fff8dc">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
  </g>
  <text x="1105" y="165" class="tval">8+</text>
  <text x="1105" y="185" class="tlabel">LANGUAGES</text>

  <!-- Header ribbon -->
  <g transform="translate(20 20)">
    <rect x="0" y="0" width="160" height="24" rx="4" fill="rgba(255,215,0,0.08)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
    <circle cx="12" cy="12" r="3" fill="#ffd700"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <text x="22" y="16" class="tlabel" text-anchor="start">ACHIEVEMENTS · UNLOCKED</text>
  </g>
</svg>
