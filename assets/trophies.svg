<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none">
  <defs>
    <linearGradient id="bgt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0d15"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff8dc"/>
      <stop offset="50%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#8a6d00"/>
    </linearGradient>
    <linearGradient id="trophyGoldBright" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8a6d00"/>
    </linearGradient>
    <linearGradient id="titleBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(255,215,0,0)"/>
      <stop offset="50%"  stop-color="rgba(255,215,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="rgba(255,215,0,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,215,0,0)"/>
    </radialGradient>
    <filter id="tglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hardshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .tlabel   { font: 700 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; text-anchor: middle; letter-spacing: 2px; }
      .tval     { font: 800 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff8dc; text-anchor: middle; }
      .ttier    { font: 700 9px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #0a0a0a; text-anchor: middle; letter-spacing: 1.5px; }
      .tribbon  { font: 700 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #fff8dc; text-anchor: middle; letter-spacing: 1.5px; }
      .ttitle   { font: 800 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #ffd700; text-anchor: middle; letter-spacing: 5px; }
      .tsubtitle { font: 600 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #8a7a3a; text-anchor: middle; letter-spacing: 3px; }
      .ticon    { font: 700 14px -apple-system, BlinkMacSystemFont, sans-serif; fill: #0a0a0a; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#bgt)" rx="8"/>

  <!-- Top gold line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <line x1="0" y1="299" x2="1200" y2="299" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>

  <!-- subtle grid background -->
  <g opacity="0.04" stroke="#ffd700">
    <path d="M0 70 H1200"/><path d="M0 220 H1200"/>
    <path d="M170 0 V300"/><path d="M340 0 V300"/><path d="M510 0 V300"/>
    <path d="M680 0 V300"/><path d="M850 0 V300"/><path d="M1020 0 V300"/>
  </g>

  <!-- Centered title ribbon -->
  <g transform="translate(600 36)">
    <rect x="-240" y="-18" width="480" height="36" fill="url(#titleBg)"/>
    <line x1="-240" y1="-18" x2="240" y2="-18" stroke="rgba(255,215,0,0.4)" stroke-width="1"/>
    <line x1="-240" y1="18" x2="240" y2="18" stroke="rgba(255,215,0,0.4)" stroke-width="1"/>
    <!-- left decoration -->
    <line x1="-220" y1="0" x2="-170" y2="0" stroke="#ffd700" stroke-width="1"/>
    <circle cx="-165" cy="0" r="2.5" fill="#ffd700"/>
    <!-- right decoration -->
    <line x1="220" y1="0" x2="170" y2="0" stroke="#ffd700" stroke-width="1"/>
    <circle cx="165" cy="0" r="2.5" fill="#ffd700"/>
    <!-- pulse dot left of text -->
    <circle cx="-105" cy="0" r="3" fill="#ffd700">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text y="5" class="ttitle">ACHIEVEMENTS · UNLOCKED</text>
    <circle cx="105" cy="0" r="3" fill="#ffd700">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="600" y="68" class="tsubtitle">/ 7 TROPHIES EARNED · TIER RANK SSS → A /</text>

  <!-- 7 Trophies: commits, repos, stars, followers, prs, issues, languages -->
  <!-- X positions: 82, 245, 408, 571, 734, 897, 1060 (gap = 163) -->

  <!-- ══ TROPHY 1: COMMITS ══ -->
  <g transform="translate(82 165)">
    <!-- Base laurels -->
    <g opacity="0.6" fill="url(#trophyGold)" filter="url(#hardshadow)">
      <path d="M-32 38 Q-42 32 -44 22 Q-38 24 -32 30 Z"/>
      <path d="M-30 42 Q-40 40 -44 32 Q-36 32 -30 36 Z"/>
      <path d="M32 38 Q42 32 44 22 Q38 24 32 30 Z"/>
      <path d="M30 42 Q40 40 44 32 Q36 32 30 36 Z"/>
    </g>
    <!-- Glow backdrop -->
    <circle cx="0" cy="0" r="50" fill="url(#glow)"/>
    <!-- Trophy cup -->
    <g filter="url(#tglow)">
      <!-- Handles -->
      <path d="M-22 -22 Q-36 -22 -36 -8 Q-36 2 -24 4" fill="none" stroke="url(#trophyGold)" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 -22 Q36 -22 36 -8 Q36 2 24 4" fill="none" stroke="url(#trophyGold)" stroke-width="3" stroke-linecap="round"/>
      <!-- Cup body with gradient -->
      <path d="M-22 -28 L-22 -32 L22 -32 L22 -28 L22 -8 Q22 14 0 18 Q-22 14 -22 -8 Z" fill="url(#trophyGoldBright)" stroke="#b8860b" stroke-width="1.5"/>
      <!-- Highlight shine -->
      <path d="M-15 -28 Q-17 -15 -13 -4" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
      <!-- Icon INSIDE cup: </> for commits -->
      <text x="0" y="-8" class="ticon">&lt;/&gt;</text>
      <!-- Neck/stem -->
      <rect x="-6" y="18" width="12" height="6" fill="url(#trophyGold)"/>
      <!-- Base -->
      <rect x="-18" y="24" width="36" height="5" rx="1" fill="url(#trophyGold)"/>
      <rect x="-22" y="29" width="44" height="4" rx="1" fill="url(#ribbon)"/>
    </g>
    <!-- Floating tier badge -->
    <g transform="translate(30 -30)">
      <circle cx="0" cy="0" r="10" fill="url(#trophyGoldBright)" stroke="#b8860b" stroke-width="1"/>
      <text y="3" class="ttier">SSS</text>
    </g>
    <!-- Sparkles -->
    <g fill="#fff8dc">
      <circle cx="28" cy="-28" r="1.5"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="-30" cy="-20" r="1"><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0.8s"/></circle>
    </g>
  </g>
  <text x="82" y="225" class="tval">800+</text>
  <text x="82" y="245" class="tlabel">COMMITS</text>
  <text x="82" y="262" class="tsubtitle" font-size="8">FIRE · SSS</text>

  <!-- ══ TROPHY 2: REPOSITORIES ══ -->
  <g transform="translate(245 165)">
    <g opacity="0.5" fill="url(#trophyGold)" filter="url(#hardshadow)">
      <path d="M-32 38 Q-42 32 -44 22 Q-38 24 -32 30 Z"/>
      <path d="M32 38 Q42 32 44 22 Q38 24 32 30 Z"/>
