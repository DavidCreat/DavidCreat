      <path d="M0 -23 L2 -17 L8 -16 L4 -12 L5 -6 L0 -9 L-5 -6 L-4 -12 L-8 -16 L-2 -17 Z" fill="#ffd700">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
      </path>
      <rect x="-6" y="18" width="12" height="6" fill="url(#trophyGold)"/>
