<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#0d1020"/>
      <stop offset="60%" stop-color="#070812"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff8dc"/>
      <stop offset="45%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      /* Fuentes 100% nativas: GitHub sanitiza @import externos en SVG embebidos */
      .title { font: 800 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #fff8dc; letter-spacing: 0.1em; }
      .sub   { font: 500 11px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; letter-spacing: 0.3em; }
      .core-text { font: 800 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #0a0a0a; text-anchor: middle; }
      .core-sub  { font: 600 9px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #0a0a0a; text-anchor: middle; letter-spacing: 0.25em; }
      .skill     { font: 600 12px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #fff8dc; text-anchor: middle; }
      .tier      { font: 700 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; letter-spacing: 0.28em; }
      .ring      { fill: none; stroke: rgba(255,215,0,0.18); stroke-width: 1; stroke-dasharray: 2 6; }
      .ring-solid{ fill: none; stroke: rgba(255,215,0,0.28); stroke-width: 1; }
      .link      { stroke: rgba(255,215,0,0.35); stroke-width: 1; }
    </style>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#ffd700" stroke-width="1">
    <path d="M0 140 H900"/>
    <path d="M0 280 H900"/>
    <path d="M0 420 H900"/>
    <path d="M225 0 V560"/>
    <path d="M450 0 V560"/>
    <path d="M675 0 V560"/>
  </g>

  <!-- Title -->
  <text x="450" y="48" class="title" text-anchor="middle">TECH CONSTELLATION</text>
  <text x="450" y="72" class="sub"   text-anchor="middle">// MAPEO DE ECOSISTEMA //</text>

  <!-- Decorative corner brackets -->
  <g stroke="#ffd700" stroke-width="2" fill="none">
    <path d="M20 100 L20 80 L40 80"/>
    <path d="M880 100 L880 80 L860 80"/>
    <path d="M20 530 L20 550 L40 550"/>
    <path d="M880 530 L880 550 L860 550"/>
  </g>

  <!-- Center system: rings at (450, 310) -->
  <g transform="translate(450 310)">
    <!-- Orbit rings -->
    <circle r="80"  class="ring-solid"/>
    <circle r="150" class="ring"/>
    <circle r="220" class="ring"/>

    <!-- Rotating inner orbit (Tier 1: Frontend) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>

      <!-- Connection lines -->
      <line x1="0" y1="0" x2="0"    y2="-150" class="link"/>
      <line x1="0" y1="0" x2="143"  y2="-46"  class="link"/>
      <line x1="0" y1="0" x2="88"   y2="121"  class="link"/>
      <line x1="0" y1="0" x2="-88"  y2="121"  class="link"/>
      <line x1="0" y1="0" x2="-143" y2="-46"  class="link"/>

      <!-- Nodes (with counter-rotation for text) -->
      <g transform="translate(0 -150)">
        <circle r="22" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="r" values="22;25;22" dur="3s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite"/>
          <text class="core-text" y="5" font-size="13">React</text>
        </g>
      </g>
      <g transform="translate(143 -46)">
        <circle r="20" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="r" values="20;23;20" dur="3.4s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="12">Next</text>
        </g>
      </g>
      <g transform="translate(88 121)">
        <circle r="20" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="r" values="20;23;20" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="11">Vue</text>
        </g>
      </g>
      <g transform="translate(-88 121)">
        <circle r="20" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="r" values="20;23;20" dur="4.2s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="10">TS</text>
        </g>
      </g>
      <g transform="translate(-143 -46)">
        <circle r="20" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="r" values="20;23;20" dur="3.6s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="10">Tailwind</text>
        </g>
      </g>
    </g>

    <!-- Rotating outer orbit (reverse direction: Backend + Cloud) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="360" to="0" dur="60s" repeatCount="indefinite"/>

      <!-- Nodes on 220 radius -->
      <g transform="translate(0 -220)">
        <circle r="18" fill="url(#node)" filter="url(#glow)">
          <animate attributeName="opacity" values="0.85;1;0.85" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="10">Node</text>
        </g>
      </g>
      <g transform="translate(155 -155)">
        <circle r="16" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="3" font-size="9">Nest</text>
        </g>
      </g>
      <g transform="translate(220 0)">
        <circle r="18" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="10">GQL</text>
        </g>
      </g>
      <g transform="translate(155 155)">
        <circle r="16" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="3" font-size="9">Docker</text>
        </g>
      </g>
      <g transform="translate(0 220)">
        <circle r="18" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="9">K8s</text>
        </g>
      </g>
      <g transform="translate(-155 155)">
        <circle r="16" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="3" font-size="9">AWS</text>
        </g>
      </g>
      <g transform="translate(-220 0)">
        <circle r="18" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="4" font-size="9">Mongo</text>
        </g>
      </g>
      <g transform="translate(-155 -155)">
        <circle r="16" fill="url(#node)" filter="url(#glow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="core-text" y="3" font-size="9">Redis</text>
        </g>
      </g>
    </g>

    <!-- Central core -->
    <circle r="65" fill="url(#core)" filter="url(#softGlow)"/>
    <circle r="65" fill="none" stroke="#fff8dc" stroke-width="2" opacity="0.9"/>
    <circle r="72" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1">
      <animate attributeName="r" values="72;82;72" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text class="core-text" y="-4">DAVID</text>
    <text class="core-text" y="16">FONSECA</text>
    <text class="core-sub"  y="34">SYS.ARCHITECT</text>
  </g>

  <!-- Left-side legend -->
  <g transform="translate(40 130)">
    <text class="tier">TIER I</text>
    <text class="skill" x="0" y="24" text-anchor="start" fill="#e6e1cf">Frontend Stack</text>
    <text class="tier" y="68">TIER II</text>
    <text class="skill" x="0" y="92" text-anchor="start" fill="#e6e1cf">Backend &amp; APIs</text>
    <text class="tier" y="136">TIER III</text>
    <text class="skill" x="0" y="160" text-anchor="start" fill="#e6e1cf">Cloud &amp; DevOps</text>
    <text class="tier" y="204">TIER IV</text>
    <text class="skill" x="0" y="228" text-anchor="start" fill="#e6e1cf">Data Engines</text>
  </g>

  <!-- Right-side stats -->
  <g transform="translate(860 130)">
    <text class="tier" text-anchor="end">UPTIME</text>
    <text class="skill" x="0" y="24" text-anchor="end" fill="#fff8dc" font-size="22" font-weight="700">99.99%</text>
    <text class="tier" y="68" text-anchor="end">LATENCY</text>
    <text class="skill" x="0" y="92" text-anchor="end" fill="#fff8dc" font-size="22" font-weight="700">&lt; 50ms</text>
    <text class="tier" y="136" text-anchor="end">COMMITS</text>
    <text class="skill" x="0" y="160" text-anchor="end" fill="#fff8dc" font-size="22" font-weight="700">10K+</text>
    <text class="tier" y="204" text-anchor="end">COFFEE</text>
    <text class="skill" x="0" y="228" text-anchor="end" fill="#fff8dc" font-size="22" font-weight="700">INFINITY</text>
  </g>
</svg>
