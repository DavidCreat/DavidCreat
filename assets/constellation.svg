<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#0d1020"/>
      <stop offset="60%" stop-color="#070812"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff8dc"/>
      <stop offset="45%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#1a1a24"/>
      <stop offset="70%"  stop-color="#0b0d15"/>
      <stop offset="100%" stop-color="#05060c"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title     { font: 800 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #fff8dc; letter-spacing: 0.1em; }
      .sub       { font: 500 11px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; letter-spacing: 0.3em; }
      .core-text { font: 800 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #0a0a0a; text-anchor: middle; }
      .core-sub  { font: 700 9px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #3a2d00; text-anchor: middle; letter-spacing: 0.3em; }
      .node-text { font: 700 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #ffffff; text-anchor: middle; }
      .node-text-sm { font: 700 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #ffffff; text-anchor: middle; }
      .skill     { font: 600 13px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #fff8dc; }
      .stat      { font: 800 24px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #fff8dc; }
      .tier      { font: 700 10px ui-monospace, 'SF Mono', 'Consolas', monospace; fill: #ffd700; letter-spacing: 0.32em; }
      .ring      { fill: none; stroke: rgba(255,215,0,0.18); stroke-width: 1; stroke-dasharray: 2 6; }
      .ring-solid{ fill: none; stroke: rgba(255,215,0,0.28); stroke-width: 1; }
      .link      { stroke: rgba(255,215,0,0.28); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1000" height="620" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#ffd700" stroke-width="1">
    <path d="M0 155 H1000"/>
    <path d="M0 310 H1000"/>
    <path d="M0 465 H1000"/>
    <path d="M250 0 V620"/>
    <path d="M500 0 V620"/>
    <path d="M750 0 V620"/>
  </g>

  <!-- Title -->
  <text x="500" y="50" class="title" text-anchor="middle">TECH CONSTELLATION</text>
  <text x="500" y="74" class="sub"   text-anchor="middle">// MAPEO DE ECOSISTEMA //</text>

  <!-- Decorative corner brackets -->
  <g stroke="#ffd700" stroke-width="2" fill="none">
    <path d="M20 105 L20 85 L40 85"/>
    <path d="M980 105 L980 85 L960 85"/>
    <path d="M20 595 L20 615 L40 615"/>
    <path d="M980 595 L980 615 L960 615"/>
  </g>

  <!-- Left-side legend (moved inwards for padding) -->
  <g transform="translate(72 160)">
    <rect x="-20" y="-20" width="165" height="305" rx="8" fill="rgba(255,215,0,0.03)" stroke="rgba(255,215,0,0.12)" stroke-width="1"/>
    <text class="tier">TIER I</text>
    <text class="skill" y="24">Frontend Stack</text>
    <text class="tier" y="72">TIER II</text>
    <text class="skill" y="96">Backend &amp; APIs</text>
    <text class="tier" y="144">TIER III</text>
    <text class="skill" y="168">Cloud &amp; DevOps</text>
    <text class="tier" y="216">TIER IV</text>
    <text class="skill" y="240">Data Engines</text>
  </g>

  <!-- Right-side stats (moved inwards for padding) -->
  <g transform="translate(928 160)">
    <rect x="-145" y="-20" width="165" height="305" rx="8" fill="rgba(255,215,0,0.03)" stroke="rgba(255,215,0,0.12)" stroke-width="1"/>
    <text class="tier" text-anchor="end">UPTIME</text>
    <text class="stat" y="28" text-anchor="end">99.99%</text>
    <text class="tier" y="72" text-anchor="end">LATENCY</text>
    <text class="stat" y="100" text-anchor="end">&lt; 50ms</text>
    <text class="tier" y="144" text-anchor="end">COMMITS</text>
    <text class="stat" y="172" text-anchor="end">10K+</text>
    <text class="tier" y="216" text-anchor="end">COFFEE</text>
    <text class="stat" y="244" text-anchor="end" font-size="20">INFINITY</text>
  </g>

  <!-- Center system at (500, 340), rings reduced so nothing overflows -->
  <g transform="translate(500 340)">
    <!-- Orbit rings -->
    <circle r="72"  class="ring-solid"/>
    <circle r="135" class="ring"/>
    <circle r="200" class="ring"/>

    <!-- Rotating inner orbit (Tier 1: Frontend) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="0" to="360" dur="42s" repeatCount="indefinite"/>

      <!-- Connection lines -->
      <line x1="0" y1="0" x2="0"    y2="-135" class="link"/>
      <line x1="0" y1="0" x2="129"  y2="-41"  class="link"/>
      <line x1="0" y1="0" x2="79"   y2="109"  class="link"/>
      <line x1="0" y1="0" x2="-79"  y2="109"  class="link"/>
      <line x1="0" y1="0" x2="-129" y2="-41"  class="link"/>

      <!-- Nodes (dark fill + white text + golden glow ring) -->
      <g transform="translate(0 -135)">
        <circle r="24" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="r" values="24;27;24" dur="3s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="42s" repeatCount="indefinite"/>
          <text class="node-text" y="4">React</text>
        </g>
      </g>
      <g transform="translate(129 -41)">
        <circle r="22" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="r" values="22;25;22" dur="3.4s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="42s" repeatCount="indefinite"/>
          <text class="node-text" y="4">Next</text>
        </g>
      </g>
      <g transform="translate(79 109)">
        <circle r="22" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="r" values="22;25;22" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="42s" repeatCount="indefinite"/>
          <text class="node-text" y="4">Vue</text>
        </g>
      </g>
      <g transform="translate(-79 109)">
        <circle r="22" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="r" values="22;25;22" dur="4.2s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="42s" repeatCount="indefinite"/>
          <text class="node-text" y="4">TS</text>
        </g>
      </g>
      <g transform="translate(-129 -41)">
        <circle r="22" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="r" values="22;25;22" dur="3.6s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="-360" dur="42s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Tailwind</text>
        </g>
      </g>
    </g>

    <!-- Rotating outer orbit (reverse direction: Backend + Cloud + Data) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="360" to="0" dur="60s" repeatCount="indefinite"/>

      <!-- 8 nodes on 200 radius, cos/sin at multiples of 45 deg -->
      <g transform="translate(0 -200)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)">
          <animate attributeName="opacity" values="0.9;1;0.9" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Node</text>
        </g>
      </g>
      <g transform="translate(141 -141)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Nest</text>
        </g>
      </g>
      <g transform="translate(200 0)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">GQL</text>
        </g>
      </g>
      <g transform="translate(141 141)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Docker</text>
        </g>
      </g>
      <g transform="translate(0 200)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">K8s</text>
        </g>
      </g>
      <g transform="translate(-141 141)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">AWS</text>
        </g>
      </g>
      <g transform="translate(-200 0)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Mongo</text>
        </g>
      </g>
      <g transform="translate(-141 -141)">
        <circle r="20" fill="url(#node)" stroke="#ffd700" stroke-width="2" filter="url(#nodeGlow)"/>
        <g>
          <animateTransform attributeName="transform" attributeType="XML"
            type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
          <text class="node-text-sm" y="4">Redis</text>
        </g>
      </g>
    </g>

    <!-- Central core (golden, keeps black text for max contrast) -->
    <circle r="60" fill="url(#core)" filter="url(#softGlow)"/>
    <circle r="60" fill="none" stroke="#fff8dc" stroke-width="2" opacity="0.9"/>
    <circle r="68" fill="none" stroke="rgba(255,215,0,0.6)" stroke-width="1">
      <animate attributeName="r" values="68;80;68" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text class="core-text" y="-4">DAVID</text>
    <text class="core-text" y="16">FONSECA</text>
    <text class="core-sub"  y="36">SYS.ARCHITECT</text>
  </g>
</svg>
